name: ci

on:
  push:
    branches: [ "main", "master" ]

permissions:
  security-events: write
  contents: read

jobs:
  pruebas_seguridad:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Bandit Scan
        run: |
          pip install bandit
          bandit -r . -f json -o bandit-output.json || true
          bandit -r . -f sarif -o bandit-output.sarif || true

      - name: Semgrep Scan
        run: |
          docker run --rm -v $(pwd):/src returntocorp/semgrep semgrep scan --severity=ERROR --severity=WARNING --json --output=semgrep-output.json || true
          docker run --rm -v $(pwd):/src returntocorp/semgrep semgrep scan --severity=ERROR --severity=WARNING --sarif --output=semgrep-output.sarif || true

      - name: Subir JSONs (Para entrega)
        uses: actions/upload-artifact@v4
        with:
          name: reportes-json
          path: |
            bandit-output.json
            semgrep-output.json

      - name: Upload Bandit SARIF
        uses: github/codeql-action/upload-sarif@v3
        if: always()
        with:
          sarif_file: bandit-output.sarif

      - name: Upload Semgrep SARIF
        uses: github/codeql-action/upload-sarif@v3
        if: always()
        with:
          sarif_file: semgrep-output.sarif

  build_image:
    needs: pruebas_seguridad
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Build
        run: docker build -t pygoat:latest .
      - name: Docker Scout
        uses: docker/scout-action@v1
        with:
          command: quickview
          image: pygoat:latest
