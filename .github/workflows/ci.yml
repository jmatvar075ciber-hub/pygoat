name: ci

on:
  push:
    branches: [ "main", "master" ]

permissions:
  security-events: write
  contents: read

jobs:
  pipeline:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout del código
        uses: actions/checkout@v4

      - name: Configurar Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Ejecutar Scans de Seguridad
        run: |
          # 1. Instalar Bandit
          pip install bandit
          
          # 2. Crear archivos vacíos para que NUNCA de error de "path not found"
          touch bandit-report.json bandit-report.sarif semgrep-report.json semgrep-report.sarif
          
          # 3. Correr Bandit (el '|| true' evita que el pipeline se pare si hay fallos)
          bandit -r . -f json -o bandit-report.json || true
          bandit -r . -f sarif -o bandit-report.sarif || true
          
          # 4. Correr Semgrep usando Docker
          docker run --rm -v $(pwd):/src returntocorp/semgrep semgrep scan --severity=ERROR --severity=WARNING --json --output=semgrep-report.json || true
          docker run --rm -v $(pwd):/src returntocorp/semgrep semgrep scan --severity=ERROR --severity=WARNING --sarif --output=semgrep-report.sarif || true

      - name: Subir JSONs (Artefactos para descargar)
        uses: actions/upload-artifact@v4
        with:
          name: reportes-json
          path: |
            bandit-report.json
            semgrep-report.json

      - name: Subir Bandit a pestaña Security
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: bandit-report.sarif
        if: always()

      - name: Subir Semgrep a pestaña Security
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: semgrep-report.sarif
        if: always()

      - name: Build y Scout (Final)
        run: |
          docker build -t pygoat:latest .
