name: CI Pipeline

on:
  push:
    branches: [ "master", "main" ]
  pull_request:

permissions:
  contents: read
  security-events: write

jobs:
  bandit_scan:
    name: Run Bandit Scan
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install Bandit
        run: pip install bandit
      - name: Run Bandit (JSON & SARIF)
        run: |
          bandit -r . -f json -o bandit.json || true
          bandit -r . -f sarif -o bandit.sarif || true
      - name: Upload Bandit JSON
        uses: actions/upload-artifact@v4
        with:
          name: bandit-json
          path: bandit.json
      - name: Upload Bandit SARIF
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: bandit.sarif

  semgrep_scan:
    name: Run Semgrep Scan
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      - name: Run Semgrep
        run: |
          docker run --rm -v $(pwd):/src returntocorp/semgrep semgrep scan --json --output=sast-semgrep.json || true
          docker run --rm -v $(pwd):/src returntocorp/semgrep semgrep scan --sarif --output=semgrep.sarif || true
      - name: Upload Semgrep JSON
        uses: actions/upload-artifact@v4
        with:
          name: semgrep-json
          path: sast-semgrep.json
      - name: Upload Semgrep SARIF
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: semgrep.sarif

  docker_build_and_scan:
    name: Build & Scan Docker Image
    runs-on: ubuntu-latest
    needs: [bandit_scan, semgrep_scan]
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      - name: Build Docker image
        run: docker build -t pygoat .
      - name: Run Trivy Scan
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: pygoat
          format: sarif
          output: trivy.sarif
      - name: Upload Trivy SARIF
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: trivy.sarif
