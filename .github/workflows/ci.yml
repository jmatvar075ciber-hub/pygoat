name: ci

on:
  push:
    branches: [ "main", "master" ]

permissions:
  security-events: write
  contents: read

jobs:
  seguridad:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout del codigo
        uses: actions/checkout@v4

      # Bandit: Usamos la version master que es la mas compatible
      - name: Bandit Scan
        uses: shundor/python-bandit-scan@master
        with:
          exit_code: 0

      # Semgrep: Esta accion es muy robusta
      - name: Semgrep Scan
        uses: returntocorp/semgrep-action@v1
        with:
          generateSarif: "1"

      # Subir los resultados a la pestaña Security
      # Nota: Estas acciones buscan automaticamente los archivos bandit.sarif y semgrep.sarif
      - name: Upload Bandit SARIF
        uses: github/codeql-action/upload-sarif@v3
        if: always()
        with:
          sarif_file: bandit.sarif

      - name: Upload Semgrep SARIF
        uses: github/codeql-action/upload-sarif@v3
        if: always()
        with:
          sarif_file: semgrep.sarif
