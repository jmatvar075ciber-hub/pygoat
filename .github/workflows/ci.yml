name: ci

on:
  push:
    branches: [ "main", "master" ]

permissions:
  security-events: write
  contents: read

jobs:
  analisis:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      # Bandit: Instalamos y ejecutamos sin filtros para que encuentre cosas
      - name: Bandit Scan
        run: |
          pip install bandit
          bandit -r . -f sarif -o bandit-results.sarif || echo "Bandit finished with issues"
          bandit -r . -f json -o bandit-results.json || echo "Bandit finished with issues"

      # Semgrep: Usamos la acción oficial de Docker pero de forma directa
      - name: Semgrep Scan
        run: |
          docker run --rm -v $(pwd):/src returntocorp/semgrep semgrep scan --sarif --output=semgrep-results.sarif || echo "Semgrep finished"
          docker run --rm -v $(pwd):/src returntocorp/semgrep semgrep scan --json --output=semgrep-results.json || echo "Semgrep finished"

      # Subir SARIF de Bandit
      - name: Upload Bandit SARIF
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: bandit-results.sarif
        if: always()

      # Subir SARIF de Semgrep
      - name: Upload Semgrep SARIF
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: semgrep-results.sarif
        if: always()

      # Subir los JSON para que los descargues
      - name: Upload JSONs
        uses: actions/upload-artifact@v4
        with:
          name: reportes-json
          path: |
            bandit-results.json
            semgrep-results.json
